<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login - Transferencia de Saldo Móvil</title>
    <style>
        /* Reset básico */
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #4a90e2, #357ABD);
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
        }

        /* Contenedor principal */
        .container {
            background: #fff;
            border-radius: 10px;
            width: 380px;
            max-width: 90vw;
            padding: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #357ABD;
        }

        /* Formulario */
        form {
            display: flex;
            flex-direction: column;
        }

        label {
            margin-bottom: 6px;
            font-weight: 600;
        }

        input[type="text"],
        input[type="password"],
        input[type="number"],
        select {
            padding: 10px 12px;
            font-size: 1rem;
            border: 1.5px solid #ccc;
            border-radius: 6px;
            margin-bottom: 18px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        input[type="password"]:focus,
        input[type="number"]:focus,
        select:focus {
            border-color: #357ABD;
            outline: none;
        }

        button {
            padding: 12px;
            background-color: #357ABD;
            border: none;
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #285a8f;
        }

        /* Mensajes de error */
        .error {
            color: #e74c3c;
            font-size: 0.9rem;
            margin-bottom: 15px;
            text-align: center;
        }

        /* Página transferencia */
        .transfer-container {
            display: none;
        }

        .operator-select {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .operator {
            flex: 1;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s ease;
            border: 2px solid transparent;
            border-radius: 10px;
            padding: 10px 0;
            margin: 0 5px;
        }

        .operator img {
            max-height: 50px;
            margin-bottom: 8px;
            user-select: none;
        }

        .operator.selected {
            border-color: #357ABD;
            background-color: #e6f0ff;
            transform: scale(1.05);
        }

        /* Footer */
        footer {
            margin-top: 30px;
            text-align: center;
            font-size: 0.9rem;
            color: #777;
        }

        /* Responsive */
        @media(max-width: 420px) {
            .operator-select {
                flex-direction: column;
            }
            .operator {
                margin: 5px 0;
            }
        }
    </style>
</head>
<body>

<div class="container" id="login-container">
    <h2>Iniciar Sesión</h2>
    <form id="login-form">
        <label for="username">Usuario:</label>
        <input type="text" id="username" name="username" autocomplete="username" required placeholder="Ingrese usuario" />

        <label for="password">Contraseña:</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required placeholder="Ingrese contraseña" />

        <div class="error" id="login-error"></div>

        <button type="submit">Entrar</button>
    </form>
</div>

<div class="container transfer-container" id="transfer-container">
    <h2>Transferencia de Saldo Móvil</h2>
    <form id="transfer-form">
        <label>Seleccione Operadora:</label>
        <div class="operator-select" id="operator-select">
            <div class="operator" data-operator="movilnet" tabindex="0" title="Movilnet">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c8/Movilnet_logo.svg/1200px-Movilnet_logo.svg.png" alt="Movilnet" />
                <div>Movilnet</div>
            </div>
            <div class="operator" data-operator="digitel" tabindex="0" title="Digitel">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/6/6f/Digitel_logo.svg/1200px-Digitel_logo.svg.png" alt="Digitel" />
                <div>Digitel</div>
            </div>
            <div class="operator" data-operator="cantv" tabindex="0" title="Cantv">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/55/Cantv_logo.svg/1200px-Cantv_logo.svg.png" alt="Cantv" />
                <div>Cantv</div>
            </div>
            <div class="operator" data-operator="movistar" tabindex="0" title="Movistar">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/7/79/Movistar_logo.svg/1200px-Movistar_logo.svg.png" alt="Movistar" />
                <div>Movistar</div>
            </div>
        </div>

        <label for="phone">Número de teléfono:</label>
        <input type="text" id="phone" name="phone" maxlength="11" placeholder="Ej: 04121234567" required />

        <label for="amount">Monto a transferir (Bs):</label>
        <input type="number" id="amount" name="amount" min="1" max="100000" placeholder="Ej: 100" required />

        <div class="error" id="transfer-error"></div>
        <div class="success" id="transfer-success" style="color:green; font-weight:600; margin-bottom:15px;"></div>

        <button type="submit">Realizar Transferencia</button>
    </form>
    <button id="logout-btn" style="margin-top:15px; background-color:#e74c3c;">Cerrar Sesión</button>
</div>

<script>
    // Login lógica
    const loginForm = document.getElementById('login-form');
    const loginError = document.getElementById('login-error');
    const loginContainer = document.getElementById('login-container');
    const transferContainer = document.getElementById('transfer-container');

    loginForm.addEventListener('submit', function(e){
        e.preventDefault();
        const username = loginForm.username.value.trim();
        const password = loginForm.password.value.trim();

        if(username === 'admin' && password === '=========='){
            loginError.textContent = '';
            loginContainer.style.display = 'none';
            transferContainer.style.display = 'block';
            // Optionally clear form
            loginForm.reset();
        } else {
            loginError.textContent = 'Usuario o contraseña incorrectos.';
        }
    });

    // Transferencia lógica
    const operators = document.querySelectorAll('.operator');
    let selectedOperator = null;

    const operatorSelect = document.getElementById('operator-select');
    const transferForm = document.getElementById('transfer-form');
    const transferError = document.getElementById('transfer-error');
    const transferSuccess = document.getElementById('transfer-success');
    const phoneInput = document.getElementById('phone');

    // Permitir seleccionar operador con click o teclado
    operators.forEach(op => {
        op.addEventListener('click', () => selectOperator(op));
        op.addEventListener('keydown', (e) => {
            if(e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                selectOperator(op);
            }
        });
    });

    function selectOperator(op) {
        operators.forEach(o => o.classList.remove('selected'));
        op.classList.add('selected');
        selectedOperator = op.getAttribute('data-operator');
        transferError.textContent = '';
        transferSuccess.textContent = '';
        phoneInput.value = '';
        phoneInput.focus();
    }

    // Validación número teléfono según operadora (simple ejemplo)
    function validarTelefono(numero, operador) {
        // Quitar espacios y guiones
        numero = numero.replace(/[\s\-]/g, '');
        if(!/^\d{11}$/.test(numero)) return false;

        // Prefijos por operadora (ejemplos)
        const prefijos = {
            movilnet: ['0416','0426','0414'],
            digitel: ['0414','0424','0412'],
            cantv: ['0212'], // Cantv es fija pero aquí como ejemplo
            movistar: ['0412','0416','0426']
        };

        if(!prefijos[operador]) return false;
        for(let pref of prefijos[operador]){
            if(numero.startsWith(pref)) return true;
        }
        return false;
    }

    transferForm.addEventListener('submit', function(e){
        e.preventDefault();
        transferError.textContent = '';
        transferSuccess.textContent = '';

        if(!selectedOperator){
            transferError.textContent = 'Por favor seleccione una operadora.';
            return;
        }

        const phone = phoneInput.value.trim();
        const amount = Number(transferForm.amount.value);

        if(!validarTelefono(phone, selectedOperator)){
            transferError.textContent = 'Número de teléfono inválido para la operadora seleccionada.';
            return;
        }

        if(isNaN(amount) || amount <= 0){
            transferError.textContent = 'Ingrese un monto válido mayor que cero.';
            return;
        }

        // Simular transferencia
        transferSuccess.textContent = `Transferencia exitosa de Bs amount.toFixed(2)a{amount.toFixed(2)} aamount.toFixed(2)a{phone} (${selectedOperator.toUpperCase()})`;

        // Limpiar formulario (excepto operador)
        transferForm.amount.value = '';
        phoneInput.value = '';
    });

    // Cerrar sesión
    const logoutBtn = document.getElementById('logout-btn');
    logoutBtn.addEventListener('click', () => {
        transferContainer.style.display = 'none';
        loginContainer.style.display = 'block';
        selectedOperator = null;
        operators.forEach(o => o.classList.remove('selected'));
        transferForm.reset();
        loginForm.reset();
        loginError.textContent = '';
        transferError.textContent = '';
        transferSuccess.textContent = '';
    });
</script>

</body>
</html>
