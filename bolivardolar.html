<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Página en Mantenimiento</title>
    <style>
        /* Reset y estilos base */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f0f0;
            color: #333;
        }
        .container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }
        .icon {
            font-size: 120px;
            color: #ff9800;
            margin-bottom: 30px;
        }
        .message {
            font-size: 1.25rem;
            max-width: 450px;
            margin-bottom: 20px;
            line-height: 1.5;
        }
        .timer {
            font-size: 1.5rem;
            font-weight: bold;
            color: #555;
            font-family: monospace;
        }
        /* Icon Tools (SVG) */
        svg {
            width: 120px;
            height: 120px;
            fill: #ff9800;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Icono herramientas (SVG inline) -->
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true" role="img" aria-label="Icono de herramientas">
            <path d="M22.7 19.3l-6-6c.3-.8.3-1.7 0-2.5l2.5-2.5-4-4-2.5 2.5c-.8-.3-1.7-.3-2.5 0l-6-6L2 5.5l6 6c-.3.8-.3 1.7 0 2.5L5.5 16l4 4 2.5-2.5c.8.3 1.7.3 2.5 0l6 6 1.7-1.7-6-6zM7.5 15c-.8 0-1.5-.7-1.5-1.5S6.7 12 7.5 12 9 12.7 9 13.5 8.3 15 7.5 15z"/>
        </svg>

        <div class="message">
            Disculpe, en estos momentos estamos trabajando para que nuestra aplicación obtenga mejora para nuestros usuarios.
        </div>

        <div class="timer" aria-live="polite" aria-atomic="true" id="timer">
            Tiempo en mantenimiento: 00:00
        </div>
    </div>

    <script>
        // Variables para conteo de tiempo
        let secondsElapsed = 0;

        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        function updateTimer() {
            secondsElapsed++;
            const timerElement = document.getElementById('timer');
            timerElement.textContent = `Tiempo en mantenimiento: ${formatTime(secondsElapsed)}`;
        }

        // Iniciar el timer y actualizar cada segundo
        setInterval(updateTimer, 1000);
    </script>
</body>
</html>
