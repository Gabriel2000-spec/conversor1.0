<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RJ VISION - Visualizador de Video</title>
  <style>
    /* Reset and base styles */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body, html {
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen,
        Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif;
      background-color: #000;
      color: #fff;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    /* Splash screen container */
    #splash {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      z-index: 1000;
    }
    /* Container for orbiting balls and app name */
    #orbit-container {
      position: relative;
      width: 100px;
      height: 100px;
      margin-bottom: 30px;
    }
    /* Orbit ring - invisible but used for animation path */
    #orbit {
      position: absolute;
      width: 100px;
      height: 100px;
      border-radius: 50%;
      /* border: 1px solid rgba(255,255,255,0.2); */
      top: 0;
      left: 0;
    }
    /* The two balls orbiting like TikTok splash */
    .orbit-ball {
      position: absolute;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: linear-gradient(45deg, #25F4EE, #FE2C55);
      box-shadow: 0 0 8px rgba(255, 255, 255, 0.8);
      top: 40px; /* center vertically relative to orbit */
      left: 0;
      transform-origin: 50px 50px;
    }
    /* Second ball uses different gradient */
    .orbit-ball.second {
      background: linear-gradient(45deg, #FE2C55, #25F4EE);
      top: 40px;
      left: 0;
    }
    /* Animation for first ball clockwise */
    @keyframes orbit1 {
      0% {
        transform: rotate(0deg) translateX(40px) rotate(0deg);
      }
      100% {
        transform: rotate(360deg) translateX(40px) rotate(-360deg);
      }
    }
    /* Animation for second ball counter-clockwise with delay */
    @keyframes orbit2 {
      0% {
        transform: rotate(180deg) translateX(40px) rotate(0deg);
      }
      100% {
        transform: rotate(540deg) translateX(40px) rotate(-360deg);
      }
    }
    .orbit-ball.first {
      animation: orbit1 2s linear infinite;
    }
    .orbit-ball.second {
      animation: orbit2 2s linear infinite;
    }
    /* App name style */
    #app-name {
      font-size: 2rem;
      font-weight: 900;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-family: 'Arial Black', Arial, sans-serif;
      color: white;
      text-shadow: 0 0 10px #25F4EE, 0 0 20px #FE2C55;
      opacity: 0;
      transition: opacity 0.5s ease;
    }
    /* Show app name - fade in */
    #app-name.show {
      opacity: 1;
    }

    /* Main app container */
    #app {
      display: none;
      height: 100vh;
      width: 100vw;
      position: relative;
      overflow: hidden;
      background: black;
    }

    /* Video container - for swipe vertical */
    #video-container {
      height: 100%;
      width: 100%;
      touch-action: pan-y;
      position: relative;
    }

    /* Each video styled to fill viewport */
    .video-slide {
      height: 100vh;
      width: 100vw;
      position: absolute;
      top: 0;
      left: 0;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: transform 0.3s ease-out;
      will-change: transform;
    }
    video {
      max-height: 100vh;
      max-width: 100vw;
      object-fit: contain;
      background: black;
      outline: none;
    }

    /* Right side icons container */
    #icons {
      position: fixed;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 24px;
      z-index: 10;
      user-select: none;
    }

    /* Icon button style */
    .icon-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.3);
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      transition: background-color 0.3s;
      color: white;
      font-size: 24px;
      box-shadow: 0 0 8px rgba(255, 255, 255, 0.2);
    }
    .icon-btn:hover,
    .icon-btn:focus {
      background: rgba(255, 255, 255, 0.1);
      outline: none;
    }

    /* Left side video counter */
    #video-counter {
      position: fixed;
      left: 12px;
      top: 12px;
      font-size: 14px;
      font-weight: 600;
      background: rgba(0, 0, 0, 0.3);
      padding: 6px 12px;
      border-radius: 20px;
      user-select: none;
      z-index: 10;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    /* Heart animation */
    .heart-animate {
      position: fixed;
      pointer-events: none;
      z-index: 20;
      font-size: 32px;
      color: #fe2c55;
      opacity: 0.9;
      animation: heart-pop 0.8s forwards;
    }
    @keyframes heart-pop {
      0% {
        transform: scale(1);
        opacity: 0.9;
      }
      100% {
        transform: scale(2) translateY(-60px);
        opacity: 0;
      }
    }

    /* Toast message for copying/linking feedback */
    #toast {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.7);
      color: #fff;
      padding: 12px 24px;
      border-radius: 24px;
      font-size: 14px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      z-index: 30;
    }
    #toast.show {
      opacity: 1;
      pointer-events: auto;
    }

  </style>
</head>
<body>
  <!-- Splash screen with orbiting balls and app name -->
  <div id="splash" aria-label="Pantalla de bienvenida RJ VISION" role="dialog" aria-modal="true">
    <div id="orbit-container" aria-hidden="true">
      <div id="orbit">
        <div class="orbit-ball first" aria-hidden="true"></div>
        <div class="orbit-ball second" aria-hidden="true"></div>
      </div>
    </div>
    <div id="app-name" aria-live="polite" aria-atomic="true">RJ VISION</div>
  </div>

  <!-- Main app container -->
  <main id="app" role="main" tabindex="-1" aria-label="Visualizador de videos RJ VISION">
    <div id="video-counter" aria-live="polite" aria-atomic="true" aria-relevant="text">1 / 1</div>
    <section id="video-container"></section>

    <!-- Right side icons -->
    <nav id="icons" aria-label="Controles del video">
      <button class="icon-btn" id="like-btn" aria-pressed="false" aria-label="Me gusta">
        <svg aria-hidden="true" width="24" height="24" fill="currentColor" viewBox="0 0 24 24">
          <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 
          4.42 3 7.5 3c1.74 0 3.41 0.81 
          4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 
          3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 
          11.54L12 21.35z"/>
        </svg>
      </button>
      <button class="icon-btn" id="comment-btn" aria-label="Comentarios">
        <svg aria-hidden="true" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2z"></path>
        </svg>
      </button>
      <button class="icon-btn" id="share-btn" aria-label="Compartir">
        <svg aria-hidden="true" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
          <circle cx="18" cy="5" r="3"></circle>
          <circle cx="6" cy="12" r="3"></circle>
          <circle cx="18" cy="19" r="3"></circle>
          <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line>
          <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line>
        </svg>
      </button>
      <button class="icon-btn" id="download-btn" aria-label="Descargar video">
        <svg aria-hidden="true" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
      </button>
    </nav>
  </main>

  <!-- Toast message -->
  <div id="toast" role="alert" aria-live="assertive" aria-atomic="true"></div>

  <script>
    // Videos array with more than 300 videos can be added here (for demonstration, only a few sample links)
    // Each video object: { src: 'url', audio: true }
    // All videos have audio enabled by default, muted false
    const videos = [
      { src: 'img/noticias.mp4' },
      
      
      { src: 'img/risa.mp4' },
      
      
      { src: 'img/café con pan.mp4' },
      
      
       { src: 'img/gato.mp4' },
      
      
       { src: 'img/gozo en mi alma.mp4' },



        { src: 'img/video1.mp4' },





        { src: 'img/2026-02-19-231306552.mp4' },




        { src: 'img/eb6b4d36ab9c774f65af5b68d4bf8cc1.mp4' },


      
         
         { src: 'img/video2.mp4' },





          { src: 'img/video3.mp4' },



            { src: 'img/VID-20260127-WA0034.mp4' },

      
      
      
      // ... add up to 300+ video URLs following the same pattern
    ];

    const splash = document.getElementById('splash');
    const app = document.getElementById('app');
    const appName = document.getElementById('app-name');
    const videoContainer = document.getElementById('video-container');
    const videoCounter = document.getElementById('video-counter');
    const likeBtn = document.getElementById('like-btn');
    const commentBtn = document.getElementById('comment-btn');
    const shareBtn = document.getElementById('share-btn');
    const downloadBtn = document.getElementById('download-btn');
    const toast = document.getElementById('toast');

    // LocalStorage keys
    const STORAGE_KEY = 'rjvision-likes';

    // State variables
    let currentIndex = 0;
    let isTransitioning = false;
    let startY = null;
    let currentTranslateY = 0;
    let likes = {}; // { videoIndex: boolean }

    // Load likes from localStorage
    function loadLikes() {
      try {
        const stored = localStorage.getItem(STORAGE_KEY);
        if (stored) {
          likes = JSON.parse(stored);
        }
      } catch {
        likes = {};
      }
    }
    // Save likes to localStorage
    function saveLikes() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(likes));
    }

    // Show toast message
    function showToast(message) {
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => {
        toast.classList.remove('show');
      }, 2000);
    }

    // Create video slide element
    function createVideoSlide(videoObj, index) {
      const slide = document.createElement('section');
      slide.classList.add('video-slide');
      slide.setAttribute('aria-label', `Video index+1de{index + 1} deindex+1de{videos.length}`);
      slide.setAttribute('role', 'region');
      slide.style.transform = `translateY(${index === currentIndex ? 0 : 100}vh)`;
      slide.dataset.index = index;

      const video = document.createElement('video');
      video.src = videoObj.src;
      video.controls = false;
      video.muted = false;
      video.playsInline = true;
      video.preload = 'auto';
      video.setAttribute('tabindex', '-1');
      video.setAttribute('aria-hidden', 'true');
      video.autoplay = true;
      video.loop = true;
      video.volume = 1.0;

      slide.appendChild(video);
      return slide;
    }

    // Render initial video slides (only current, previous and next for performance)
    function renderVideos() {
      videoContainer.innerHTML = '';
      // For large number of videos, only render current, previous and next for performance
      const indexesToRender = new Set([currentIndex]);
      if (currentIndex > 0) indexesToRender.add(currentIndex - 1);
      if (currentIndex < videos.length - 1) indexesToRender.add(currentIndex + 1);

      indexesToRender.forEach(i => {
        const slide = createVideoSlide(videos[i], i);
        videoContainer.appendChild(slide);
      });

      updateVideoPositions();
      updateCounter();
      updateLikeButton();
    }

    // Update transform of slides based on currentIndex
    function updateVideoPositions() {
      const slides = videoContainer.querySelectorAll('.video-slide');
      slides.forEach(slide => {
        const idx = Number(slide.dataset.index);
        if (idx === currentIndex) {
          slide.style.transform = 'translateY(0)';
          slide.querySelector('video').play();
        } else if (idx < currentIndex) {
          slide.style.transform = 'translateY(-100vh)';
          slide.querySelector('video').pause();
        } else {
          slide.style.transform = 'translateY(100vh)';
          slide.querySelector('video').pause();
        }
      });
    }

    // Update video counter text
    function updateCounter() {
      videoCounter.textContent = `${currentIndex + 1} - ${videos.length}`;
    }

    // Update like button state
    function updateLikeButton() {
      const liked = likes[currentIndex];
      likeBtn.setAttribute('aria-pressed', liked ? 'true' : 'false');
      likeBtn.style.color = liked ? '#FE2C55' : 'white';
    }

    // Handle like toggle
    function toggleLike() {
      const currentlyLiked = likes[currentIndex];
      if (currentlyLiked) {
        delete likes[currentIndex];
      } else {
        likes[currentIndex] = true;
        animateHeart();
      }
      saveLikes();
      updateLikeButton();
    }

    // Heart animation on like
    function animateHeart() {
      const heart = document.createElement('div');
      heart.classList.add('heart-animate');
      heart.textContent = '❤️';
      heart.style.left = (window.innerWidth - 60) + 'px'; // near like button
      heart.style.top = (window.innerHeight / 2) + 'px';
      document.body.appendChild(heart);
      setTimeout(() => {
        heart.remove();
      }, 800);
    }

    // Handle comments click (placeholder)
    function openComments() {
      showToast('Funcionalidad de comentarios no implementada.');
    }

    // Handle share button click - share via WhatsApp or copy link
    function shareVideo() {
      const videoUrl = videos[currentIndex].src;
      // Create WhatsApp share link
      const whatsappUrl = `https://wa.me/?text=${encodeURIComponent(videoUrl)}`;
      if (navigator.share) {
        navigator.share({
          title: 'Video RJ VISION',
          text: 'Mira este video en RJ VISION',
          url: videoUrl,
        }).catch(() => {
          // fallback
          window.open(whatsappUrl, '_blank');
        });
      } else {
        // fallback: open WhatsApp and copy link
        copyToClipboard(videoUrl);
        window.open(whatsappUrl, '_blank');
        showToast('Enlace copiado al portapapeles y WhatsApp abierto.');
      }
    }

    // Copy text to clipboard with fallback
    function copyToClipboard(text) {
      if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(text).catch(() => fallbackCopyText(text));
      } else {
        fallbackCopyText(text);
      }
    }
    function fallbackCopyText(text) {
      const textArea = document.createElement('textarea');
      textArea.value = text;
      textArea.style.position = 'fixed';
      textArea.style.left = '-9999px';
      textArea.style.top = '-9999px';
      document.body.appendChild(textArea);
      textArea.focus();
      textArea.select();
      try {
        document.execCommand('copy');
      } catch {}
      document.body.removeChild(textArea);
    }

    // Download current video
    function downloadVideo() {
      const videoUrl = videos[currentIndex].src;
      const a = document.createElement('a');
      a.href = videoUrl;
      a.download = `video-${currentIndex + 1}.mp4`; // assuming mp4 or webm
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      showToast('Descarga iniciada.');
    }

    // Swipe handling for vertical navigation
    function onTouchStart(e) {
      if (isTransitioning) return;
      if (e.touches && e.touches.length === 1) {
        startY = e.touches[0].clientY;
      }
    }
    function onTouchMove(e) {
      if (startY === null || isTransitioning) return;
      const currentY = e.touches[0].clientY;
      const deltaY = currentY - startY;

      // Limit vertical translation of current slide and next/prev
      const currentSlide = videoContainer.querySelector(`.video-slide[data-index="${currentIndex}"]`);
      if (!currentSlide) return;

      let nextIndex = null;
      if (deltaY < 0 && currentIndex < videos.length - 1) {
        // Swipe up - next video
        nextIndex = currentIndex + 1;
      } else if (deltaY > 0 && currentIndex > 0) {
        // Swipe down - previous video
        nextIndex = currentIndex - 1;
      } else {
        nextIndex = null;
      }

      if (nextIndex === null) {
        // No next slide, just move current slide with resistance
        currentSlide.style.transform = `translateY(${deltaY / 3}px)`;
      } else {
        // Move current and next slide together
        const nextSlide = videoContainer.querySelector(`.video-slide[data-index="${nextIndex}"]`);
        currentSlide.style.transform = `translateY(${deltaY}px)`;
        if (nextSlide) {
          nextSlide.style.transform = `translateY(${deltaY > 0 ? deltaY - window.innerHeight : deltaY + window.innerHeight}px)`;
        }
      }
    }
    function onTouchEnd(e) {
      if (startY === null || isTransitioning) return;
      const endY = e.changedTouches[0].clientY;
      const deltaY = endY - startY;
      const threshold = 100; // px to trigger slide change
      let nextIndex = currentIndex;

      if (deltaY < -threshold && currentIndex < videos.length - 1) {
        nextIndex = currentIndex + 1;
      } else if (deltaY > threshold && currentIndex > 0) {
        nextIndex = currentIndex - 1;
      }

      if (nextIndex !== currentIndex) {
        isTransitioning = true;
        // Animate slides to new position
        const currentSlide = videoContainer.querySelector(`.video-slide[data-index="${currentIndex}"]`);
        const nextSlide = videoContainer.querySelector(`.video-slide[data-index="${nextIndex}"]`);
        if (!currentSlide || !nextSlide) {
          startY = null;
          isTransitioning = false;
          return;
        }

        // Animate current slide out
        currentSlide.style.transition = 'transform 0.3s ease-out';
        currentSlide.style.transform = `translateY(${deltaY < 0 ? -window.innerHeight : window.innerHeight}px)`;

        // Animate next slide in
        nextSlide.style.transition = 'transform 0.3s ease-out';
        nextSlide.style.transform = 'translateY(0)';

        nextSlide.querySelector('video').play();

        // After animation ends
        const onTransitionEnd = () => {
          currentSlide.style.transition = '';
          nextSlide.style.transition = '';

          // Pause previous video
          currentSlide.querySelector('video').pause();

          currentIndex = nextIndex;
          updateCounter();
          updateLikeButton();

          // Remove out of screen videos for performance
          renderVideos();

          isTransitioning = false;
          currentSlide.removeEventListener('transitionend', onTransitionEnd);
        };
        currentSlide.addEventListener('transitionend', onTransitionEnd);
      } else {
        // Animate back to original position
        const currentSlide = videoContainer.querySelector(`.video-slide[data-index="${currentIndex}"]`);
        if (currentSlide) {
          currentSlide.style.transition = 'transform 0.3s ease-out';
          currentSlide.style.transform = 'translateY(0)';
          currentSlide.addEventListener('transitionend', () => {
            currentSlide.style.transition = '';
          }, { once: true });
        }
        const nextSlide = videoContainer.querySelector(`.video-slide[data-index="${currentIndex + 1}"]`);
        if (nextSlide) {
          nextSlide.style.transition = 'transform 0.3s ease-out';
          nextSlide.style.transform = 'translateY(100vh)';
          nextSlide.addEventListener('transitionend', () => {
            nextSlide.style.transition = '';
          }, { once: true });
        }
        const prevSlide = videoContainer.querySelector(`.video-slide[data-index="${currentIndex - 1}"]`);
        if (prevSlide) {
          prevSlide.style.transition = 'transform 0.3s ease-out';
          prevSlide.style.transform = 'translateY(-100vh)';
          prevSlide.addEventListener('transitionend', () => {
            prevSlide.style.transition = '';
          }, { once: true });
        }
      }
      startY = null;
    }

    // Keyboard support for accessibility: up/down arrows to change video
    function onKeyDown(e) {
      if (isTransitioning) return;
      if (e.key === 'ArrowUp') {
        if (currentIndex > 0) {
          changeVideo(currentIndex - 1);
        }
      } else if (e.key === 'ArrowDown') {
        if (currentIndex < videos.length - 1) {
          changeVideo(currentIndex + 1);
        }
      }
    }

    // Programmatic change video (used by keyboard)
    function changeVideo(newIndex) {
      if (newIndex === currentIndex || newIndex < 0 || newIndex >= videos.length) return;
      isTransitioning = true;

      const currentSlide = videoContainer.querySelector(`.video-slide[data-index="${currentIndex}"]`);
      const nextSlide = videoContainer.querySelector(`.video-slide[data-index="${newIndex}"]`);
      if (!currentSlide || !nextSlide) {
        isTransitioning = false;
        return;
      }

      const directionUp = newIndex < currentIndex;

      currentSlide.style.transition = 'transform 0.3s ease-out';
      currentSlide.style.transform = `translateY(${directionUp ? window.innerHeight : -window.innerHeight}px)`;

      nextSlide.style.transition = 'transform 0.3s ease-out';
      nextSlide.style.transform = 'translateY(0)';

      nextSlide.querySelector('video').play();

      const onTransitionEnd = () => {
        currentSlide.style.transition = '';
        nextSlide.style.transition = '';

        currentSlide.querySelector('video').pause();

        currentIndex = newIndex;
        updateCounter();
        updateLikeButton();

        renderVideos();

        isTransitioning = false;
        currentSlide.removeEventListener('transitionend', onTransitionEnd);
      };
      currentSlide.addEventListener('transitionend', onTransitionEnd);
    }

    // Initialize app after splash screen
    function initApp() {
      splash.style.display = 'none';
      app.style.display = 'block';
      app.focus();
      loadLikes();
      renderVideos();
    }

    // Show app name after 2 seconds orbit animation
    function showAppName() {
      appName.classList.add('show');
    }

    // Sequence splash screen then init app
    function startSplashSequence() {
      // Show orbit balls for 2 seconds, then show app name for 1.5 seconds, then load app
      setTimeout(() => {
        showAppName();
        setTimeout(() => {
          initApp();
        }, 1500);
      }, 2000);
    }

    // Add event listeners
    function addEventListeners() {
      likeBtn.addEventListener('click', toggleLike);
      commentBtn.addEventListener('click', openComments);
      shareBtn.addEventListener('click', shareVideo);
      downloadBtn.addEventListener('click', downloadVideo);

      videoContainer.addEventListener('touchstart', onTouchStart, { passive: true });
      videoContainer.addEventListener('touchmove', onTouchMove, { passive: true });
      videoContainer.addEventListener('touchend', onTouchEnd, { passive: true });

      document.addEventListener('keydown', onKeyDown);
    }

    // Kickoff
    document.addEventListener('DOMContentLoaded', () => {
      startSplashSequence();
      addEventListeners();
    });
  </script>
</body>
</html>
